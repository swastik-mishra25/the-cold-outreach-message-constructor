<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | OutreachBuilder</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Small inline adjustment to perfectly center the thank you card */
        body {
            justify-content: center;
            align-items: center;
        }
        .thank-you-card {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            padding: 4rem 2rem;
        }
    </style>
</head>
<body>

    <main class="panel thank-you-card">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="url(#gold-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1.5rem;">
            <defs>
                <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#f1c40f" />
                    <stop offset="100%" stop-color="#d4af37" />
                </linearGradient>
            </defs>
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>

        <h1 style="color: #ffffff; font-size: 2.5rem; margin-bottom: 1rem;">Feedback Received!</h1>
        
        <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2.5rem; line-height: 1.8;">
            Thank you for taking the time to drop a review. Your insights are critical in helping us optimize and engineer a better experience for developers everywhere.
        </p>

        <a href="index.html" class="primary-btn" style="text-decoration: none; display: inline-block; width: auto; padding: 1rem 3rem;">
            Return to Generator
        </a>
    </main>

</body>
</html>
